<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="12" fill="#0b0d14"/>

  <defs>
    <linearGradient id="gold" x1="10" y1="50" x2="90" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9a7020"/>
      <stop offset="35%"  stop-color="#e8c85a"/>
      <stop offset="65%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7020"/>
    </linearGradient>
  </defs>

  <!--
    Chess king crown — traced from reference image.
    Cross at top, teardrop orb below, three large rounded lobes,
    horizontal band with two inner lines, and two curved feet.
  -->

  <!-- Cross vertical -->
  <rect x="46.5" y="4" width="7" height="18" rx="1.5" fill="url(#gold)"/>
  <!-- Cross horizontal -->
  <rect x="38" y="9" width="24" height="7" rx="1.5" fill="url(#gold)"/>

  <!-- Teardrop / orb below cross -->
  <path d="
    M50 20
    C47 20 44 23 44 26.5
    C44 30 47 32 50 32
    C53 32 56 30 56 26.5
    C56 23 53 20 50 20 Z
  " fill="#0b0d14"/>
  <path d="
    M50 18
    C45.5 18 41.5 22 41.5 26.5
    C41.5 31 45.5 34.5 50 34.5
    C54.5 34.5 58.5 31 58.5 26.5
    C58.5 22 54.5 18 50 18 Z
  " fill="url(#gold)"/>
  <path d="
    M50 20.5
    C47 20.5 44.5 23 44.5 26.5
    C44.5 30 47 32.5 50 32.5
    C53 32.5 55.5 30 55.5 26.5
    C55.5 23 53 20.5 50 20.5 Z
  " fill="#0b0d14"/>

  <!-- Crown: three lobes + connecting band
       Left lobe, center lobe, right lobe with inner dark fill -->
  <path d="
    M12 80
    C12 80 10 70 10 62
    C10 50 18 42 26 38
    C30 36 34 35.5 36 34
    C38 32 40 30 42 28
    C43.5 26 46 24 50 24
    C54 24 56.5 26 58 28
    C60 30 62 32 64 34
    C66 35.5 70 36 74 38
    C82 42 90 50 90 62
    C90 70 88 80 88 80
    L12 80 Z
  " fill="url(#gold)"/>

  <!-- Dark inner fill to create the hollow crown look -->
  <path d="
    M17 76
    C17 76 15.5 67 15.5 61
    C15.5 51 22 44 29 40.5
    C33.5 38.5 37 37.5 39 36
    C41 34.5 43 32.5 44.5 30.5
    C46 28.5 48 27.5 50 27.5
    C52 27.5 54 28.5 55.5 30.5
    C57 32.5 59 34.5 61 36
    C63 37.5 66.5 38.5 71 40.5
    C78 44 84.5 51 84.5 61
    C84.5 67 83 76 83 76 Z
  " fill="#0b0d14"/>

  <!-- Left lobe highlight (the big round bump on left) -->
  <path d="
    M17 76 C15.5 67 15.5 61 15.5 61
    C15.5 51 22 44 29 40.5
    C20 48 18 57 19 65
    C19.5 70 20.5 76 20.5 76 Z
  " fill="url(#gold)" opacity="0.3"/>

  <!-- Horizontal band -->
  <rect x="10" y="78" width="80" height="10" rx="3" fill="url(#gold)"/>

  <!-- Two inner lines on the band -->
  <rect x="14" y="81" width="72" height="2" rx="1" fill="#0b0d14"/>
  <rect x="14" y="84.5" width="72" height="2" rx="1" fill="#0b0d14"/>

  <!-- Left foot -->
  <path d="
    M10 88
    C10 88 8 90 8 93
    C8 96 10 98 14 98
    L32 98
    C36 98 38 95 38 92
    C38 90 37 88 37 88 Z
  " fill="url(#gold)"/>

  <!-- Right foot -->
  <path d="
    M90 88
    C90 88 92 90 92 93
    C92 96 90 98 86 98
    L68 98
    C64 98 62 95 62 92
    C62 90 63 88 63 88 Z
  " fill="url(#gold)"/>
</svg>
