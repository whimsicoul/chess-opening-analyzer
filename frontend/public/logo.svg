    <rect x="119" y="76" width="42" height="31" rx="6" fill="#c9a84c"/>
    <rect x="143" y="76" width="18" height="31" fill="rgba(30,8,0,0.48)"/>
    <rect x="119" y="98" width="42" height="9"  fill="rgba(30,8,0,0.28)"/>
    <path d="M104 59 L176 59 L171 76 L109 76 Z" fill="#b8933b"/>
    <path d="M143 59 L176 59 L171 76 L143 76 Z" fill="rgba(30,8,0,0.50)"/>
    <rect x="123" y="45" width="34" height="17" rx="5" fill="#8f6e22"/>
    <rect x="143" y="45" width="14" height="17" fill="rgba(30,8,0,0.55)"/>
    <circle cx="140" cy="37" r="17" fill="#c9a84c"/>
    <path d="M140,20 A17,17 0 0 1 140,54 Z" fill="rgba(30,8,0,0.50)"/>
    <circle cx="133" cy="29" r="6" fill="rgba(255,248,200,0.28)"/>
    <circle cx="120" cy="21" r="6.5" fill="#c9a84c"/>
    <path d="M120,14.5 A6.5,6.5 0 0 1 120,27.5 Z" fill="rgba(30,8,0,0.48)"/>
    <circle cx="116" cy="17" r="2.5" fill="rgba(255,248,200,0.30)"/>
    <circle cx="140" cy="14" r="8.5" fill="#c9a84c"/>
    <path d="M140,5.5 A8.5,8.5 0 0 1 140,22.5 Z"  fill="rgba(30,8,0,0.48)"/>
    <circle cx="136" cy="10" r="3.5" fill="rgba(255,248,200,0.30)"/>
    <circle cx="160" cy="21" r="6.5" fill="#c9a84c"/>
    <path d="M160,14.5 A6.5,6.5 0 0 1 160,27.5 Z" fill="rgba(30,8,0,0.48)"/>
    <circle cx="156" cy="17" r="2.5" fill="rgba(255,248,200,0.30)"/>
  </g>

  <!-- ══ Book spine (renders over side queens) ══ -->
  <!-- Spine body -->
  <rect x="133" y="138" width="14" height="78" rx="2" fill="#9a7228"/>
  <!-- Spine left dark edge -->
  <rect x="133" y="138" width="3"  height="78" fill="rgba(30,8,0,0.45)" rx="1"/>
  <!-- Spine right highlight edge -->
  <rect x="144" y="138" width="3"  height="78" fill="rgba(255,240,150,0.22)" rx="1"/>
  <!-- Spine top cap -->
  <rect x="131" y="134" width="18" height="8" rx="3" fill="#b48a35"/>
  <!-- Spine cap highlight -->
  <rect x="131" y="134" width="18" height="3" rx="2" fill="rgba(255,248,180,0.30)"/>
  <!-- Spine cap dark base -->
  <rect x="131" y="139" width="18" height="3" fill="rgba(30,8,0,0.30)"/>

  <!-- ══ CENTER MAIN QUEEN  (stark contrast) ══ -->

  <!-- Base plate -->
  <rect x="98" y="132" width="84" height="13" rx="3.5" fill="#c9a84c"/>
  <rect x="98" y="132" width="84" height="3"  rx="2" fill="rgba(255,248,200,0.38)"/>
  <rect x="98" y="132" width="16" height="13" fill="rgba(255,248,200,0.18)" clip-path="url(#c-base)"/>
  <rect x="152" y="132" width="30" height="13" fill="rgba(30,8,0,0.52)" clip-path="url(#c-base)"/>
  <rect x="98"  y="140" width="84" height="5"  fill="rgba(30,8,0,0.38)" clip-path="url(#c-base)"/>

  <!-- Lower trunk -->
  <path d="M107 104 L173 104 L178 132 L102 132 Z" fill="#b8933b"/>
  <path d="M107 104 L122 104 L117 132 L102 132 Z" fill="rgba(255,248,200,0.18)" clip-path="url(#c-trunk)"/>
  <rect x="143" y="104" width="35" height="28" fill="rgba(30,8,0,0.52)" clip-path="url(#c-trunk)"/>
  <rect x="102" y="122" width="76" height="10" fill="rgba(30,8,0,0.35)" clip-path="url(#c-trunk)"/>
  <rect x="136" y="104" width="8" height="28" fill="rgba(255,248,200,0.08)" clip-path="url(#c-trunk)"/>

  <!-- Waist -->
  <rect x="119" y="76" width="42" height="31" rx="6" fill="#c9a84c"/>
  <rect x="119" y="76" width="9"  height="31" fill="rgba(255,248,200,0.22)" clip-path="url(#c-waist)"/>
  <rect x="143" y="76" width="18" height="31" fill="rgba(30,8,0,0.52)" clip-path="url(#c-waist)"/>
  <rect x="119" y="98" width="42" height="9"  fill="rgba(30,8,0,0.38)" clip-path="url(#c-waist)"/>
  <rect x="136" y="76" width="8"  height="31" fill="rgba(255,248,200,0.08)" clip-path="url(#c-waist)"/>

  <!-- Shoulder / crown base -->
  <path d="M104 59 L176 59 L171 76 L109 76 Z" fill="#c9a84c"/>
  <rect x="104" y="59" width="72" height="3" rx="1.5" fill="rgba(255,248,200,0.38)"/>
  <path d="M104 59 L118 59 L116 76 L109 76 Z"  fill="rgba(255,248,200,0.22)" clip-path="url(#c-shoulder)"/>
  <rect x="143" y="59" width="33" height="17" fill="rgba(30,8,0,0.52)" clip-path="url(#c-shoulder)"/>
  <rect x="109" y="70" width="62" height="6"  fill="rgba(30,8,0,0.35)" clip-path="url(#c-shoulder)"/>

  <!-- Neck -->
  <rect x="123" y="45" width="34" height="17" rx="5" fill="#8f6e22"/>
  <rect x="123" y="45" width="8"  height="17" fill="rgba(255,248,200,0.22)" clip-path="url(#c-neck)"/>
  <rect x="143" y="45" width="14" height="17" fill="rgba(30,8,0,0.58)" clip-path="url(#c-neck)"/>
  <rect x="123" y="56" width="34" height="6"  fill="rgba(30,8,0,0.38)" clip-path="url(#c-neck)"/>

  <!-- Head sphere -->
  <circle cx="140" cy="37" r="17" fill="#c9a84c"/>
  <path d="M140,20 A17,17 0 0 1 140,54 Z" fill="rgba(30,8,0,0.55)" clip-path="url(#c-head)"/>
  <circle cx="151" cy="47" r="12" fill="rgba(30,8,0,0.25)" clip-path="url(#c-head)"/>
  <circle cx="131" cy="28" r="8"   fill="rgba(255,248,200,0.28)" clip-path="url(#c-head)"/>
  <circle cx="133" cy="30" r="5"   fill="rgba(255,248,200,0.18)" clip-path="url(#c-head)"/>

  <!-- Crown orbs -->
  <circle cx="120" cy="21" r="6.5" fill="#c9a84c"/>
  <path d="M120,14.5 A6.5,6.5 0 0 1 120,27.5 Z" fill="rgba(30,8,0,0.55)" clip-path="url(#c-orb-l)"/>
  <circle cx="116" cy="17" r="3.2" fill="rgba(255,248,200,0.38)" clip-path="url(#c-orb-l)"/>

  <circle cx="140" cy="14" r="8.5" fill="#c9a84c"/>
  <path d="M140,5.5 A8.5,8.5 0 0 1 140,22.5 Z" fill="rgba(30,8,0,0.55)" clip-path="url(#c-orb-c)"/>
  <circle cx="135" cy="9"  r="4.2" fill="rgba(255,248,200,0.38)" clip-path="url(#c-orb-c)"/>

  <circle cx="160" cy="21" r="6.5" fill="#c9a84c"/>
  <path d="M160,14.5 A6.5,6.5 0 0 1 160,27.5 Z" fill="rgba(30,8,0,0.55)" clip-path="url(#c-orb-r)"/>
  <circle cx="156" cy="17" r="3.2" fill="rgba(255,248,200,0.38)" clip-path="url(#c-orb-r)"/>

</svg>
