<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">

  <defs>
    <!-- Book page clip regions -->
    <clipPath id="left-page">
      <path d="M140 216 L24 160 L24 86 L140 138 Z"/>
    </clipPath>
    <clipPath id="right-page">
      <path d="M140 216 L256 160 L256 86 L140 138 Z"/>
    </clipPath>

    <!-- Center queen clip paths -->
    <clipPath id="c-trunk"><path d="M107 104 L173 104 L178 132 L102 132 Z"/></clipPath>
    <clipPath id="c-waist"><rect x="119" y="76" width="42" height="31" rx="6"/></clipPath>
    <clipPath id="c-shoulder"><path d="M104 59 L176 59 L171 76 L109 76 Z"/></clipPath>
    <clipPath id="c-head"><circle cx="140" cy="37" r="17"/></clipPath>
    <clipPath id="c-orb-l"><circle cx="120" cy="21" r="6.5"/></clipPath>
    <clipPath id="c-orb-c"><circle cx="140" cy="14" r="8.5"/></clipPath>
    <clipPath id="c-orb-r"><circle cx="160" cy="21" r="6.5"/></clipPath>
    <clipPath id="c-base"><rect x="98" y="132" width="84" height="13" rx="3.5"/></clipPath>
    <clipPath id="c-neck"><rect x="123" y="45" width="34" height="17" rx="5"/></clipPath>
  </defs>

  <!-- ══════════════════════════════
       OPEN BOOK
  ══════════════════════════════ -->

  <!-- ── Left page base fill ── -->
  <path d="M140 216 L24 160 L24 86 L140 138 Z" fill="#c9a84c"/>

  <!-- Left page: top-edge highlight band (upper ~18%, lit from behind-center) -->
  <path d="M140,138 L140,152 L24,101 L24,86 Z"
        fill="rgba(255,248,180,0.30)" clip-path="url(#left-page)"/>

  <!-- Left page: wide mid-gradient fade (page surface dims toward outer edge) -->
  <path d="M140,138 L140,216 L60,183 L60,118 Z"
        fill="rgba(30,8,0,0.14)" clip-path="url(#left-page)"/>

  <!-- Left page: spine crease shadow (sharp dark strip along inner edge) -->
  <path d="M140,138 L140,216 L118,207 L118,129 Z"
        fill="rgba(30,8,0,0.42)" clip-path="url(#left-page)"/>
  <!-- Crease darkest inner line -->
  <path d="M140,138 L140,216 L128,212 L128,133 Z"
        fill="rgba(30,8,0,0.28)" clip-path="url(#left-page)"/>

  <!-- Left page: outer-corner shadow (far from light source) -->
  <path d="M24,86 L24,160 L44,169 L44,94 Z"
        fill="rgba(30,8,0,0.22)" clip-path="url(#left-page)"/>

  <!-- Left page: lower shadow (page angles away from glow) -->
  <path d="M140,182 L140,216 L24,160 L24,128 Z"
        fill="rgba(30,8,0,0.26)" clip-path="url(#left-page)"/>

  <!-- Left page: deep bottom shadow (underside rolls into darkness) -->
  <path d="M140,205 L140,216 L24,160 L24,150 Z"
        fill="rgba(30,8,0,0.45)" clip-path="url(#left-page)"/>

  <!-- Left page: lower-outer corner darkest pocket -->
  <path d="M24,130 L24,160 L55,172 L55,142 Z"
        fill="rgba(30,8,0,0.28)" clip-path="url(#left-page)"/>

  <!-- ── Left outer-edge face (page thickness) ── -->
  <!-- Upper half — catches rear glow -->
  <path d="M24,86 L24,123 L31,127 L31,90 Z" fill="#b08840"/>
  <!-- Lower half — in shadow -->
  <path d="M24,123 L24,160 L31,164 L31,127 Z" fill="#7a5c20"/>
  <!-- Edge highlight rim -->
  <path d="M24,86 L31,90 L31,112 L24,108 Z" fill="rgba(255,240,160,0.22)"/>

  <!-- ── Right page base fill ── -->
  <path d="M140 216 L256 160 L256 86 L140 138 Z" fill="#d4b565"/>

  <!-- Right page: top-edge highlight band -->
  <path d="M140,138 L140,152 L256,101 L256,86 Z"
        fill="rgba(255,248,180,0.22)" clip-path="url(#right-page)"/>

  <!-- Right page: wide mid-gradient fade -->
  <path d="M140,138 L140,216 L220,183 L220,118 Z"
        fill="rgba(30,8,0,0.12)" clip-path="url(#right-page)"/>

  <!-- Right page: spine crease shadow -->
  <path d="M140,138 L140,216 L162,207 L162,129 Z"
        fill="rgba(30,8,0,0.36)" clip-path="url(#right-page)"/>
  <!-- Crease darkest inner line -->
  <path d="M140,138 L140,216 L152,212 L152,133 Z"
        fill="rgba(30,8,0,0.22)" clip-path="url(#right-page)"/>

  <!-- Right page: outer-corner shadow -->
  <path d="M256,86 L256,160 L236,169 L236,94 Z"
        fill="rgba(30,8,0,0.20)" clip-path="url(#right-page)"/>

  <!-- Right page: lower shadow -->
  <path d="M140,182 L140,216 L256,160 L256,128 Z"
        fill="rgba(30,8,0,0.22)" clip-path="url(#right-page)"/>

  <!-- Right page: deep bottom shadow -->
  <path d="M140,205 L140,216 L256,160 L256,150 Z"
        fill="rgba(30,8,0,0.40)" clip-path="url(#right-page)"/>

  <!-- Right page: lower-outer corner pocket -->
  <path d="M256,130 L256,160 L225,172 L225,142 Z"
        fill="rgba(30,8,0,0.24)" clip-path="url(#right-page)"/>

  <!-- ── Right outer-edge face ── -->
  <path d="M256,86 L256,123 L249,127 L249,90 Z" fill="#c8a840"/>
  <path d="M256,123 L256,160 L249,164 L249,127 Z" fill="#8a6c24"/>
  <!-- Edge highlight rim -->
  <path d="M256,86 L249,90 L249,112 L256,108 Z" fill="rgba(255,248,180,0.18)"/>

  <!-- ── Page top-edge highlight seam (V crease at top) ── -->
  <path d="M24 86 L140 138 L256 86"
        stroke="rgba(255,248,180,0.55)" stroke-width="2" fill="none"/>
  <!-- Inner bright spine crease line -->
  <path d="M140 138 L140 216"
        stroke="rgba(255,240,150,0.20)" stroke-width="1.5" fill="none"/>

  <!-- ══ Side queen shadows (cast onto pages) ══ -->
  <ellipse cx="78"  cy="116" rx="20" ry="3.5" fill="rgba(30,8,0,0.28)"/>
  <ellipse cx="202" cy="116" rx="20" ry="3.5" fill="rgba(30,8,0,0.28)"/>

