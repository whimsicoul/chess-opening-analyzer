name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            The project is already set up with all dependencies installed.
            The frontend is running at localhost:5173 and the backend at
            localhost:8001. Logs are being written to logs.txt. If needed,
            use the mcp__playwright set of tools to launch a browser and
            interact with the app. If needed, you can query the db with
            the 'sqlite3' cli.

          claude_args: |
            --mcp-config '{"mcpServers":{"playwright":{"command":"npx","args":["@playwright/mcp@latest","--allowed-origins","localhost:5173;localhost:8001;cdn.tailwindcss.com;esm.sh"]}}}'
            --allowedTools Bash(npm:*) Bash(npx:*) Bash(pip:*) Bash(sqlite3:*) Bash(curl:*) Bash(cat:*) Bash(ls:*) mcp__playwright__browser_snapshot mcp__playwright__browser_click mcp__playwright__browser_type mcp__playwright__browser_navigate mcp__playwright__browser_screenshot mcp__playwright__browser_scroll mcp__playwright__browser_fill mcp__playwright__browser_hover mcp__playwright__browser_evaluate mcp__playwright__browser_close
